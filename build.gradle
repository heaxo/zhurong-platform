plugins {
    id 'java'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.ao'
version = '0.0.1'

ext {
    springBootVersion = "3.4.13"
    springCloudVersion = "2024.0.2"
    springCloudAlibabaVersion = "2023.0.3.4"
    mybatisVersion = "3.0.5"
    lombokVersion = "1.18.42"
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    repositories {
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/spring' }
        mavenCentral()
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
            mavenBom "com.alibaba.cloud:spring-cloud-alibaba-dependencies:${springCloudAlibabaVersion}"
        }
        dependencies {
            dependency "org.mybatis.spring.boot:mybatis-spring-boot-starter:${mybatisVersion}"
            dependency "org.mybatis.spring.boot:mybatis-spring-boot-starter-test:${mybatisVersion}"
            dependency "org.projectlombok:lombok:${lombokVersion}"
        }
    }
}
