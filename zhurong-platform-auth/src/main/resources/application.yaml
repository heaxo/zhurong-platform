server:
  port: 9100
  address: 0.0.0.0

spring:
  profiles:
    active: dev
  application:
    name: zhurong-platform-auth

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:sqlserver://127.0.0.1:1433;databaseName=zhurong_platform_auth;encrypt=false
    username: sa
    password:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.zhurong.platform.auth.entity
    configuration:
      map-underscore-to-camel-case: true

  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        group: DEFAULT_GROUP
  config:
    import:
      - nacos:zhurong-platform-auth
      - nacos:zhurong-platform-auth-${spring.profiles.active}
      - nacos:zhurong-platform-security-${spring.profiles.active}
