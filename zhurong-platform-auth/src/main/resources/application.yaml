server:
  port: 9100
  address: 0.0.0.0

spring:
  profiles:
    active: dev
  application:
    name: zhurong-platform-auth

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_auth_history

  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.zhurong.platform.auth.entity
    configuration:
      map-underscore-to-camel-case: true

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        group: DEFAULT_GROUP
  config:
    import:
      - nacos:zhurong-platform-auth
      - nacos:zhurong-platform-auth-${spring.profiles.active}
      - nacos:zhurong-platform-security-${spring.profiles.active}
