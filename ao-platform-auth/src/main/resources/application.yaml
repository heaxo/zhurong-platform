server:
  port: 9100
  address: 0.0.0.0

spring:
  profiles:
    active: dev
  application:
    name: ao-platform-auth

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        group: DEFAULT_GROUP
  config:
    import:
      - nacos:ao-platform-auth
      - nacos:ao-platform-auth-${spring.profiles.active}
