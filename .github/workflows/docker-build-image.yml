name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to build Docker image for
        required: true
        default: all
        type: choice
        options:
          - all
          - gateway
          - auth
          - core

permissions:
  contents: read

jobs:
  docker-build-image:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Docker image
        run: |
          TASKS=()

          case "${{ inputs.service }}" in
            all)
              TASKS+=(":zhurong-platform-gateway:dockerBuildImage")
              TASKS+=(":zhurong-platform-auth:dockerBuildImage")
              TASKS+=(":zhurong-platform-core:dockerBuildImage")
              ;;
            gateway)
              TASKS+=(":zhurong-platform-gateway:dockerBuildImage")
              ;;
            auth)
              TASKS+=(":zhurong-platform-auth:dockerBuildImage")
              ;;
            core)
              TASKS+=(":zhurong-platform-core:dockerBuildImage")
              ;;
          esac

          ./gradlew --no-daemon --stacktrace "${TASKS[@]}"

      - name: List built images
        run: docker images "zhurong-platform/*"
