name: Build Windows Installers

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to build Windows installer for
        required: true
        default: all
        type: choice
        options:
          - all
          - gateway
          - auth
          - core
          - custom
      custom_module:
        description: Custom module to build when service is all or custom
        required: true
        default: goodmate
        type: choice
        options:
          - goodmate
          - haobao
          - crun
          - but

permissions:
  contents: read

jobs:
  windows-jpackage:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --yes --no-progress

          $wixBins = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" |
            ForEach-Object { Join-Path $_.FullName "bin" } |
            Where-Object { Test-Path $_ }

          foreach ($wixBin in $wixBins) {
            $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Include selected custom module
        if: ${{ inputs.service == 'all' || inputs.service == 'custom' }}
        shell: pwsh
        run: |
          $customPath = "zhurong-platform-custom:zhurong-platform-custom-${{ inputs.custom_module }}"
          $includeLine = "include '$customPath'"
          $settings = Get-Content settings.gradle -Raw

          if ($settings -notmatch [regex]::Escape($includeLine)) {
            Add-Content -Path settings.gradle -Value $includeLine
          }

      - name: Build bootJar
        shell: pwsh
        run: |
          $tasks = @()

          switch ("${{ inputs.service }}") {
            "all" {
              $tasks += ":zhurong-platform-gateway:bootJar"
              $tasks += ":zhurong-platform-auth:bootJar"
              $tasks += ":zhurong-platform-core:bootJar"
              $tasks += ":zhurong-platform-custom:zhurong-platform-custom-${{ inputs.custom_module }}:bootJar"
            }
            "gateway" {
              $tasks += ":zhurong-platform-gateway:bootJar"
            }
            "auth" {
              $tasks += ":zhurong-platform-auth:bootJar"
            }
            "core" {
              $tasks += ":zhurong-platform-core:bootJar"
            }
            "custom" {
              $tasks += ":zhurong-platform-custom:zhurong-platform-custom-${{ inputs.custom_module }}:bootJar"
            }
          }

          & .\gradlew.bat --no-daemon --stacktrace @tasks

      - name: Build Windows installer with jpackage
        shell: pwsh
        run: |
          function Get-GradleVersion {
            param(
              [Parameter(Mandatory = $true)]
              [string] $BuildFile
            )

            $match = Select-String -Path $BuildFile -Pattern "^\s*version\s*=\s*'([^']+)'" | Select-Object -First 1
            if (-not $match) {
              throw "Cannot find Gradle version in $BuildFile"
            }

            return $match.Matches[0].Groups[1].Value
          }

          function Invoke-ServiceJPackage {
            param(
              [Parameter(Mandatory = $true)]
              [string] $ProjectDir,
              [Parameter(Mandatory = $true)]
              [string] $AppName,
              [Parameter(Mandatory = $true)]
              [string] $JarBaseName
            )

            $version = Get-GradleVersion -BuildFile (Join-Path $ProjectDir "build.gradle")
            $base = Join-Path $ProjectDir "build"
            $input = Join-Path $base "libs"
            $appImageOut = Join-Path $base "app-image"
            $output = Join-Path $base "publish"
            $mainJar = "$JarBaseName-$version.jar"
            $mainJarPath = Join-Path $input $mainJar
            $appImageDir = Join-Path $appImageOut $AppName

            if (-not (Test-Path $mainJarPath)) {
              throw "Cannot find bootJar output: $mainJarPath"
            }

            if (Test-Path $appImageOut) {
              Remove-Item $appImageOut -Recurse -Force
            }
            if (Test-Path $output) {
              Remove-Item $output -Recurse -Force
            }

            Write-Host "Building app-image for $AppName $version"
            & jpackage `
              --type app-image `
              --name $AppName `
              --app-version $version `
              --input $input `
              --main-jar $mainJar `
              --main-class org.springframework.boot.loader.launch.JarLauncher `
              --dest $appImageOut `
              --java-options "-Dspring.profiles.active=prod"

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            Write-Host "Building exe installer for $AppName $version"
            & jpackage `
              --type exe `
              --name $AppName `
              --app-version $version `
              --app-image $appImageDir `
              --dest $output `
              --win-dir-chooser `
              --win-menu `
              --win-shortcut

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          switch ("${{ inputs.service }}") {
            "all" {
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-gateway" -AppName "zhurong-platform-gateway" -JarBaseName "zhurong-platform-gateway"
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-auth" -AppName "zhurong-platform-auth" -JarBaseName "zhurong-platform-auth"
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-core" -AppName "zhurong-platform-core" -JarBaseName "zhurong-platform-core"
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-custom\zhurong-platform-custom-${{ inputs.custom_module }}" -AppName "zhurong-custom-${{ inputs.custom_module }}" -JarBaseName "zhurong-platform-custom-${{ inputs.custom_module }}"
            }
            "gateway" {
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-gateway" -AppName "zhurong-platform-gateway" -JarBaseName "zhurong-platform-gateway"
            }
            "auth" {
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-auth" -AppName "zhurong-platform-auth" -JarBaseName "zhurong-platform-auth"
            }
            "core" {
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-core" -AppName "zhurong-platform-core" -JarBaseName "zhurong-platform-core"
            }
            "custom" {
              Invoke-ServiceJPackage -ProjectDir "zhurong-platform-custom\zhurong-platform-custom-${{ inputs.custom_module }}" -AppName "zhurong-custom-${{ inputs.custom_module }}" -JarBaseName "zhurong-platform-custom-${{ inputs.custom_module }}"
            }
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service }}-${{ inputs.custom_module }}-windows-installer
          path: |
            zhurong-platform-gateway/build/publish/*.exe
            zhurong-platform-auth/build/publish/*.exe
            zhurong-platform-core/build/publish/*.exe
            zhurong-platform-custom/zhurong-platform-custom-${{ inputs.custom_module }}/build/publish/*.exe
          if-no-files-found: error
          retention-days: 14
