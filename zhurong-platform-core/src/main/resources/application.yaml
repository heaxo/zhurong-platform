server:
  port: 9200

spring:
  profiles:
    active: dev
  application:
    name: zhurong-platform-core
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    connection-timeout: 10s
    publisher-confirm-type: correlated
    publisher-returns: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_core_history
    schemas: flyway_schema_core
    default-schema: flyway_schema_core
  datasource:
    url: jdbc:sqlserver://127.0.0.1:1433;databaseName=LSystemDB;encrypt=false
    username: sa
    password:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: localhost:8848
#        ip: 192.168.1.76
#        port: ${server.port}
      config:
        server-addr: localhost:8848
        file-extension: yaml
        group: DEFAULT_GROUP
  config:
    import:
      - nacos:zhurong-platform-core
      - nacos:zhurong-platform-core-${spring.profiles.active}
      - nacos:zhurong-platform-security-${spring.profiles.active}


mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhurong.platform.core.entity
  configuration:
    map-underscore-to-camel-case: false

zhurong:
  rabbitmq:
    enabled: false
  client-communication:
    enabled: false
    default-client-id:
    publish-retry-delay-millis: 60000
  import-file:
    storage-root: ${ZHURONG_IMPORT_FILE_STORAGE_ROOT:D:/Zhurong/import-files}
    auto-create-storage-root: true
    max-file-size: 104857600
    connect-timeout-seconds: 20
    read-timeout-seconds: 120
    windows-share-root: ${ZHURONG_IMPORT_FILE_WINDOWS_SHARE_ROOT:}
    # 外部image传入Windows共享路径时，core需要把UNC源路径映射成自身可读的本地/容器路径。
    # Docker Desktop示例：
    # windows-share-source-mappings:
    #   - share-root: "\\\\192.168.1.10\\ZhurongImportFiles"
    #     mounted-root: /app/data/import-files
    allow-private-network: false
    max-redirects: 5

lantek-config:
  install: C:/Lantek
