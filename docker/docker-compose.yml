version: '3.9'

services:
  ao-postgres:
    image: postgres:16
    container_name: ao-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: nacos_config
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d nacos_config" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ao-network

include:
  - standalone-mysql.yaml


networks:
  ao-network:
    driver: bridge
