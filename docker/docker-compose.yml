version: '3.9'

services:
  ao-postgres:
    image: postgres:16
    container_name: ao-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - ao-network

include:
  - standalone-mysql.yaml


networks:
  ao-network:
    driver: bridge
