include:
  - standalone-mysql.yaml
  - custom-crun.yml

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: zhurong-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - zhurong-network
  zhurong-postgres:
    image: postgres:16
    container_name: zhurong-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - zhurong-network

  # zhurong-platform-gateway 服务
  zhurong-platform-gateway:
    image: zhurong-platform/gateway  # 使用你打包的 Spring Boot 镜像
    container_name: zhurong-platform-gateway
    ports:
      - "9000:9000"
    depends_on:
      - nacos
    volumes:
      - ./logs/gateway:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
    restart: always
    networks:
      - zhurong-network

  # zhurong-platform-auth 服务
  zhurong-platform-auth:
    image: zhurong-platform/auth
    container_name: zhurong-platform-auth
    ports:
      - "9100:9100"
    depends_on:
      - nacos
    volumes:
      - ./logs/auth:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
    restart: always
    networks:
      - zhurong-network

  # zhurong-platform-core 服务
  zhurong-platform-core:
    image: zhurong-platform/core
    container_name: zhurong-platform-core
    profiles: ["prod"]
    ports:
      - "9200:9200"
    depends_on:
      - nacos
      - rabbitmq
    volumes:
      - ./logs/core:/app/logs
      # 宿主windows机文件夹挂载
      # docker-desktop下使用windows路径映射
      # wsl系统内使用/mnt/d或者/mnt/c路径映射
      # 左侧是宿主机路径，右侧是core容器内固定路径。
      - D:/Zhurong/import-files:/app/data/import-files
      # - /mnt/d/Zhurong/import-files:/app/data/import-files
      # 共享目录映射（外部系统可能会发共享文件夹图纸路径，如果是其他协议就不需要做这个映射，部署在docker容器内的core使用/app/source/import-files查找文件）
      - lantek-share:/app/source/import-files
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      # Java应用看到的是容器内路径，不要配置成D:/或/mnt/d。
      - ZHURONG_IMPORT_FILE_STORAGE_ROOT=/app/data/import-files
    restart: always
    networks:
      - zhurong-network

volumes:
  lantek-share:
    name: lantek-share
    driver: local
    driver_opts:
      type: cifs
      device: "//192.168.1.101/Lantek"
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},file_mode=0777,dir_mode=0777"

networks:
  zhurong-network:
    driver: bridge
